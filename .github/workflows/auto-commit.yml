name: Scheduled Automated Commit

on:
  schedule:
    # Runs everyday at 12:00 UTC. Adjust cron expression as needed.
    - cron: '0 12 * * *'
  workflow_dispatch: # Allows you to manually test it with a button click

jobs:
  commit-job:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository code
        uses: actions/checkout@v7  # Updated from @v4 to clear the Node.js deprecation warning

      - name: Make a local file change
        run: |
          echo "Last automated update: $(date)" > bot-log.txt

      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add bot-log.txt
          git commit -m "chore: automated daily sync log [skip ci]"
          git push
